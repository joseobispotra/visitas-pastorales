<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pastor360 - José Obispo</title>
<meta name="description" content="Administración pastoral: visitas, miembros, calendario, junta y tareas">
<meta name="theme-color" content="#16213e">
<link rel="icon" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-screen">
  <form class="login-card" id="login-form" autocomplete="on">
    <div class="crest">🐑</div>
    <h1>Pastor360</h1>
    <p class="subtitle">José Obispo</p>

    <div class="field">
      <label for="email">Correo</label>
      <input id="email" name="email" type="email" placeholder="tu@correo.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn btn-primary" id="login-btn">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </form>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
